# 生产 docker-compose — 一台腾讯云 CVM 跑全部依赖。
# 起步推荐配置:2c4g + 50G 系统盘。
#
# 用法:
#   1) 把整个 TrailLens 仓库 git clone 到服务器
#   2) 在仓库根复制 .env.example → .env 填值
#   3) cd infra/prod && docker compose -f docker-compose.prod.yml up -d
#   4) Caddy 自动签 HTTPS 证书,5 分钟生效

version: "3.9"

# ─────────────────────────────────────
# 全局 logging 配置(json-file + rotate)
# 不加会让 SSE agent 事件流打爆磁盘;每 service 用 <<: *logging 引用
# ─────────────────────────────────────
x-logging: &logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: traillens-pg
    restart: unless-stopped
    logging: *logging
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-traillens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?需要在 .env 设密码}
      POSTGRES_DB: ${POSTGRES_DB:-traillens}
    volumes:
      - traillens_pg_data:/var/lib/postgresql/data
      - ../../infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-traillens}"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: traillens-redis
    restart: unless-stopped
    logging: *logging
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - traillens_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]

  api:
    build:
      context: ../../
      dockerfile: apps/api/Dockerfile
    container_name: traillens-api
    restart: unless-stopped
    logging: *logging
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      # 用 docker network 内的 hostname,不走公网
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-traillens}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-traillens}
      REDIS_URL: redis://redis:6379/0
      # MVP 阶段用 local：deps.py 读 X-Dev-User-Id header,前端 dev 桥配套
      # 接真 Better Auth 后改回 prod
      TRAILLENS_ENV: ${TRAILLENS_ENV:-local}
      # JWT 签名密钥(从 host .env 继承,不入仓库)
      TRAILLENS_AUTH_SECRET: ${TRAILLENS_AUTH_SECRET:-}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-${TRAILLENS_AUTH_SECRET:-}}
      # OAuth(Google/GitHub)
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      # 国内服务器调海外 OAuth 必备(http/https/socks5);未配则直连(国内多半超时)
      OAUTH_HTTP_PROXY: ${OAUTH_HTTP_PROXY:-}
      # CF Worker 中转(替换 token/userinfo URL);配了优先于直连
      OAUTH_PROXY_BASE: ${OAUTH_PROXY_BASE:-}
      PORT: 8000
      # 从主机 .env 继承(不内置 secret)
      # llm.py 接受 ARK_* 或 DOUBAO_* 任一命名,优先 ARK_*
      ARK_API_KEY: ${ARK_API_KEY:-${DOUBAO_API_KEY:-}}
      DOUBAO_API_KEY: ${DOUBAO_API_KEY:-}
      ARK_BASE_URL: ${ARK_BASE_URL:-${DOUBAO_BASE_URL:-https://ark.cn-beijing.volces.com/api/v3}}
      DOUBAO_BASE_URL: ${DOUBAO_BASE_URL:-}
      DOUBAO_MODEL_VISION: ${DOUBAO_MODEL_VISION:-doubao-seed-2-0-pro-260215}
      DOUBAO_MODEL_TEXT: ${DOUBAO_MODEL_TEXT:-doubao-seed-1-6-thinking-250715}
      # 腾讯云 COS(国内默认)— 留空 → 走 S3 兼容路径
      COS_SECRET_ID: ${COS_SECRET_ID:-}
      COS_SECRET_KEY: ${COS_SECRET_KEY:-}
      COS_BUCKET: ${COS_BUCKET:-}
      COS_REGION: ${COS_REGION:-ap-shanghai}
      COS_DOMAIN: ${COS_DOMAIN:-}
      # 七牛云(备选)
      QINIU_ACCESS_KEY: ${QINIU_ACCESS_KEY:-}
      QINIU_SECRET_KEY: ${QINIU_SECRET_KEY:-}
      QINIU_BUCKET: ${QINIU_BUCKET:-}
      QINIU_DOMAIN: ${QINIU_DOMAIN:-}
      # 监控(可选)
      SENTRY_DSN: ${SENTRY_DSN:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
    # 监听本机 8000(仅 127.0.0.1 可见,公网摸不到),由 host 上的 nginx 反代加 SSL
    # 这是 nginx 反代模式,不要 caddy。
    # 如果有人想用纯 caddy 方案,docker compose --profile use-caddy up -d
    ports:
      - "127.0.0.1:8000:8000"

  # Web 前端(Next.js 15) — host nginx 反代到 127.0.0.1:3000
  web:
    build:
      context: ../../
      dockerfile: apps/web/Dockerfile
    container_name: traillens-web
    restart: unless-stopped
    logging: *logging
    environment:
      NODE_ENV: production
      PORT: 3000
      # 客户端走同域:web nginx 反代 /v1 → api 容器,免 CORS + cookie 自动随
      # 留空 → 浏览器走相对路径 /v1/...
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-}
      # SSR 时优先走 docker 内网,避免回环走公网 + SSL 握手
      TRAILLENS_API_INTERNAL_BASE: http://api:8000
      # 强制 landing hero 用这个 trail 的照片(避免自动 pick 到"名字骗人"的 trail)
      LANDING_TRAIL_ID: ${LANDING_TRAIL_ID:-eeac6041-5b15-461b-93e9-33244decfbfb}
      # 关掉客户端遥测
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "127.0.0.1:3000:3000"   # 仅本机暴露,host nginx 反代

  # 人工标注工具(LoRA 训练数据集) — 极简 stdlib http.server
  # 子路径 /annotate/ 反代,只允许 ANNOTATION_ALLOWED_EMAILS 名单内邮箱
  annotation:
    build:
      context: ../../
      dockerfile: packages/annotation/Dockerfile
    container_name: traillens-annotation
    restart: unless-stopped
    logging: *logging
    environment:
      PORT: 5555
      HOST: 0.0.0.0
      ANNOTATION_ALLOWED_EMAILS: ${ANNOTATION_ALLOWED_EMAILS:-}
    ports:
      - "127.0.0.1:5555:5555"
    volumes:
      - traillens_annotation_data:/app/data

  caddy:
    image: caddy:2-alpine
    container_name: traillens-caddy
    restart: unless-stopped
    logging: *logging
    profiles: ["use-caddy"]   # 默认不启动 — host 的 nginx 来反代
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - traillens_caddy_data:/data
      - traillens_caddy_config:/config

  # 可选:LLM 调用观测(每月豆包账单时打开它)
  # docker compose --profile observability -f docker-compose.prod.yml up -d
  langfuse:
    image: langfuse/langfuse:latest
    container_name: traillens-langfuse
    restart: unless-stopped
    logging: *logging
    profiles: ["observability"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-traillens}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-traillens}_langfuse
      NEXTAUTH_URL: https://obs.traillens.zorotreeking.online
      # 用 :- 给默认空值,只在启用 observability profile 时才需要真值
      # 不然 docker compose 全局插值会强制要求(即使本服务不启动)
      NEXTAUTH_SECRET: ${LANGFUSE_SECRET:-}
      SALT: ${LANGFUSE_SALT:-}
    expose:
      - "3000"

volumes:
  traillens_pg_data:
  traillens_redis_data:
  traillens_annotation_data:
  traillens_caddy_data:
  traillens_caddy_config:
