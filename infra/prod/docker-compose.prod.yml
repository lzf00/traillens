# 生产 docker-compose — 一台腾讯云 CVM 跑全部依赖。
# 起步推荐配置:2c4g + 50G 系统盘。
#
# 用法:
#   1) 把整个 TrailLens 仓库 git clone 到服务器
#   2) 在仓库根复制 .env.example → .env 填值
#   3) cd infra/prod && docker compose -f docker-compose.prod.yml up -d
#   4) Caddy 自动签 HTTPS 证书,5 分钟生效

version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: traillens-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-traillens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?需要在 .env 设密码}
      POSTGRES_DB: ${POSTGRES_DB:-traillens}
    volumes:
      - traillens_pg_data:/var/lib/postgresql/data
      - ../../infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-traillens}"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: traillens-redis
    restart: unless-stopped
    command: ["redis-server", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - traillens_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]

  api:
    build:
      context: ../../
      dockerfile: apps/api/Dockerfile
    container_name: traillens-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      # 用 docker network 内的 hostname,不走公网
      DATABASE_URL: postgresql://${POSTGRES_USER:-traillens}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-traillens}
      REDIS_URL: redis://redis:6379/0
      TRAILLENS_ENV: prod
      PORT: 8000
      # 从主机 .env 继承(不内置 secret)
      # llm.py 接受 ARK_* 或 DOUBAO_* 任一命名,优先 ARK_*
      ARK_API_KEY: ${ARK_API_KEY:-${DOUBAO_API_KEY:-}}
      DOUBAO_API_KEY: ${DOUBAO_API_KEY:-}
      ARK_BASE_URL: ${ARK_BASE_URL:-${DOUBAO_BASE_URL:-https://ark.cn-beijing.volces.com/api/v3}}
      DOUBAO_BASE_URL: ${DOUBAO_BASE_URL:-}
      DOUBAO_MODEL_VISION: ${DOUBAO_MODEL_VISION:-doubao-seed-2-0-pro-260215}
      DOUBAO_MODEL_TEXT: ${DOUBAO_MODEL_TEXT:-doubao-seed-1-6-thinking-250715}
      # 腾讯云 COS(国内默认)— 留空 → 走 S3 兼容路径
      COS_SECRET_ID: ${COS_SECRET_ID:-}
      COS_SECRET_KEY: ${COS_SECRET_KEY:-}
      COS_BUCKET: ${COS_BUCKET:-}
      COS_REGION: ${COS_REGION:-ap-shanghai}
      COS_DOMAIN: ${COS_DOMAIN:-}
      # 七牛云(备选)
      QINIU_ACCESS_KEY: ${QINIU_ACCESS_KEY:-}
      QINIU_SECRET_KEY: ${QINIU_SECRET_KEY:-}
      QINIU_BUCKET: ${QINIU_BUCKET:-}
      QINIU_DOMAIN: ${QINIU_DOMAIN:-}
      # 监控(可选)
      SENTRY_DSN: ${SENTRY_DSN:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
    # 监听本机 8000(仅 127.0.0.1 可见,公网摸不到),由 host 上的 nginx 反代加 SSL
    # 这是 nginx 反代模式,不要 caddy。
    # 如果有人想用纯 caddy 方案,docker compose --profile use-caddy up -d
    ports:
      - "127.0.0.1:8000:8000"

  caddy:
    image: caddy:2-alpine
    container_name: traillens-caddy
    restart: unless-stopped
    profiles: ["use-caddy"]   # 默认不启动 — host 的 nginx 来反代
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - traillens_caddy_data:/data
      - traillens_caddy_config:/config

  # 可选:LLM 调用观测(每月豆包账单时打开它)
  # docker compose --profile observability -f docker-compose.prod.yml up -d
  langfuse:
    image: langfuse/langfuse:latest
    container_name: traillens-langfuse
    restart: unless-stopped
    profiles: ["observability"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-traillens}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-traillens}_langfuse
      NEXTAUTH_URL: https://obs.traillens.zorotreeking.online
      # 用 :- 给默认空值,只在启用 observability profile 时才需要真值
      # 不然 docker compose 全局插值会强制要求(即使本服务不启动)
      NEXTAUTH_SECRET: ${LANGFUSE_SECRET:-}
      SALT: ${LANGFUSE_SALT:-}
    expose:
      - "3000"

volumes:
  traillens_pg_data:
  traillens_redis_data:
  traillens_caddy_data:
  traillens_caddy_config:
