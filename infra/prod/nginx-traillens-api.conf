# nginx server block: api.traillens.zorotreeking.online → docker api 容器
#
# 部署:
#   1. 把这个文件 cp 到 /etc/nginx/conf.d/traillens-api.conf
#   2. 改 ssl_certificate / ssl_certificate_key 为你的真实路径
#   3. nginx -t                # 检查语法
#   4. systemctl reload nginx
#
# 证书申请见 infra/prod/SSL_CERT_GUIDE.md

# ────────────────────────────────────────────────────
# rate limit zones(必须放 http {} 域内,这里为顶层生效)
# 装法:文件放 /www/server/panel/vhost/nginx/traillens-api.conf 时
# 宝塔 include 到 nginx.conf http {} 下 → 顶层 limit_req_zone 生效
# ────────────────────────────────────────────────────
# 每 IP 每秒 20 请求 · burst 40(总量 60s 峰值,超即 429)
limit_req_zone $binary_remote_addr zone=api_general:10m rate=20r/s;
# 登录/注册 每 IP 每分钟 10 次(防爆破)
limit_req_zone $binary_remote_addr zone=api_auth:10m rate=10r/m;
# LLM 计费面(SSE run):每 IP 每小时 30 次(约 2 min 一次,防刷豆包账单)
limit_req_zone $binary_remote_addr zone=api_llm:10m rate=30r/h;

# HTTP → HTTPS 跳转
server {
    listen 80;
    listen [::]:80;
    server_name api.traillens.zorotreeking.online;
    return 301 https://$host$request_uri;
}

# HTTPS 主入口
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.traillens.zorotreeking.online;

    # ----- SSL 证书 -----
    # 改成你的真实证书路径:
    ssl_certificate     /etc/nginx/ssl/api.traillens.zorotreeking.online.crt;
    ssl_certificate_key /etc/nginx/ssl/api.traillens.zorotreeking.online.key;

    # 复用你现有的 SSL 配置(如果有 /etc/nginx/snippets/ssl-params.conf 之类),否则用默认:
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ----- 安全 header -----
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "DENY" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ----- 文件上传大小(摄影师的 RAW 可能很大) -----
    client_max_body_size 100M;
    client_body_buffer_size 128k;

    # ----- 认证端点单独限流 · 防爆破 -----
    location ~* ^/v1/auth/(sign-in|sign-up)$ {
        limit_req zone=api_auth burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # ----- LLM 计费面 SSE run · 防刷爆豆包账单 -----
    location ~* ^/v1/trails/[^/]+/run$ {
        limit_req zone=api_llm burst=3 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_buffering         off;
        proxy_cache             off;
        proxy_read_timeout      600s;
        proxy_send_timeout      600s;
    }

    # ----- 主反代到 docker API 容器 · 通用限流 -----
    location / {
        limit_req zone=api_general burst=40 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        # 标准反代 header
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host  $host;

        # ----- SSE (流式 endpoint) 支持 -----
        # /v1/trails/.../run 是 SSE,必须禁 buffer
        proxy_buffering         off;
        proxy_cache             off;
        proxy_read_timeout      600s;   # agent run 可能跑 10 分钟
        proxy_send_timeout      600s;
        proxy_connect_timeout   30s;

        # WebSocket(将来可能用)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ----- /healthz 单独配:更短 timeout,可缓存 -----
    location = /healthz {
        proxy_pass http://127.0.0.1:8000/healthz;
        proxy_read_timeout 5s;
        access_log off;
    }

    # 日志
    access_log /var/log/nginx/traillens-api.access.log;
    error_log  /var/log/nginx/traillens-api.error.log;
}
