# nginx server block: traillens.zorotreeking.online → docker web 容器
#
# 部署:
#   cp /opt/traillens/infra/prod/nginx-traillens-web.conf \
#      /www/server/panel/vhost/nginx/traillens-web.conf
#   nginx -t && nginx -s reload

# HTTP → HTTPS 跳转
server {
    listen 80;
    listen [::]:80;
    server_name traillens.zorotreeking.online;
    return 301 https://$host$request_uri;
}

# HTTPS 主入口
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name traillens.zorotreeking.online;

    # ----- SSL 证书 -----
    ssl_certificate     /etc/nginx/ssl/traillens.zorotreeking.online.crt;
    ssl_certificate_key /etc/nginx/ssl/traillens.zorotreeking.online.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL_web:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ----- 安全 header -----
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # 允许 OG 卡片被搜索引擎/微信等爬取
    add_header X-Frame-Options "SAMEORIGIN" always;

    # ----- 标注工具 /annotate/ → annotation 容器:5555 -----
    # 末尾斜杠 strip 前缀:nginx 把 /annotate/foo → :5555/foo
    location = /annotate {
        return 301 /annotate/;   # 无尾斜杠时 redirect,否则相对路径会断
    }
    location /annotate/ {
        proxy_pass http://127.0.0.1:5555/;
        proxy_http_version 1.1;
        proxy_set_header Host        $host;
        proxy_set_header X-Real-IP   $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        # 标注上传图片可能大,放宽 body 限制
        client_max_body_size 50m;
        proxy_read_timeout 60s;
    }

    # ----- 同域反代 /v1/* 到 API 容器 -----
    # 让浏览器 fetch 走同域,绕开 CORS + cookie 自动随同域请求
    location /v1/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # SSE 必须关闭 buffering
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;

        # /v1/trails/*/photos:upload 需要大 body(默认继承 1M 不够)
        client_max_body_size 200m;
    }

    # ----- 反代到 Next.js (docker 内部) -----
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host  $host;

        # Next.js 数据请求/dev HMR/SSE 需要的
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 关掉宝塔全局 proxy_cache(cache_one),不然 RSC + cookie 个性化
        # 全被缓存成第一个访问者的版本
        proxy_cache off;
        proxy_no_cache 1;
        proxy_cache_bypass 1;

        proxy_read_timeout 60s;
    }

    # ----- /_next/static 长缓存(SSR app 的 hash 资源) -----
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 7d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ----- /og 卡片 CDN 缓存(被微信/小红书爬取) -----
    location /og {
        proxy_pass http://127.0.0.1:3000;
        add_header Cache-Control "public, max-age=600, s-maxage=86400";
    }

    # ----- 日志 -----
    access_log /www/wwwlogs/traillens-web.access.log;
    error_log  /www/wwwlogs/traillens-web.error.log;
}
