<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>TrailLens Annotator</title>
<style>
  :root {
    --bg: #0F1115; --bg2: #1A1E25; --bg3: #232932;
    --fg: #E8ECF1; --fg2: #9AA4B2; --fg3: #5B6573;
    --aurora: #6FBF8B; --glacier: #8FB8D1;
    --golden: #E8B96A; --danger: #D97757;
  }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--fg);
         font: 14px/1.5 -apple-system, "PingFang SC", system-ui, sans-serif; }
  .grid { display:grid; grid-template-columns: 280px 1fr 360px; height:100vh; }

  /* 缩略图轨道 */
  aside.track { background:var(--bg); border-right:1px solid rgba(255,255,255,.06);
                overflow-y:auto; padding:8px; }
  .track h3 { font-size:11px; color:var(--fg2); margin:0 8px 8px; text-transform:uppercase;
              letter-spacing:.5px; font-weight:500; }
  .thumb { display:flex; gap:8px; align-items:center; padding:6px; border-radius:6px;
           cursor:pointer; margin-bottom:2px; }
  .thumb:hover { background:var(--bg2); }
  .thumb.selected { background:var(--bg3); outline:1px solid var(--glacier); }
  .thumb.done { opacity:.6; }
  .thumb .name { font-size:12px; flex:1; min-width:0;
                 overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .thumb .badge { color:var(--aurora); font-size:11px; }

  /* 主舞台 */
  main { display:flex; flex-direction:column; align-items:center; justify-content:center;
         padding:24px; gap:16px; background:var(--bg); overflow:hidden; }
  main img { max-width:100%; max-height:70vh; border-radius:8px;
             box-shadow:0 0 0 1px rgba(255,255,255,.06); object-fit:contain; }
  main .filename { font-family:"Fraunces", serif; font-size:18px; color:var(--fg2); }
  .hint { font-family:ui-monospace, monospace; font-size:11px; color:var(--fg3); }
  kbd { background:var(--bg2); border:1px solid rgba(255,255,255,.06);
        padding:1px 5px; border-radius:3px; font-family:inherit; }

  /* 评分面板 */
  aside.panel { background:var(--bg); border-left:1px solid rgba(255,255,255,.06);
                padding:16px; overflow-y:auto; }
  .panel h3 { margin:0 0 12px; font-family:"Fraunces", serif; font-size:18px; }
  .dim { display:grid; grid-template-columns: 1fr auto; gap:6px;
         padding:6px 0; border-bottom:1px solid rgba(255,255,255,.04); }
  .dim label { color:var(--fg2); font-size:12px; }
  .dim .value { color:var(--aurora); font-family:ui-monospace, monospace; font-weight:600; }
  .dim input[type="range"] { grid-column: 1 / -1; accent-color:var(--aurora); width:100%; }
  .save { width:100%; padding:10px; background:var(--aurora); color:#000;
          border:none; border-radius:6px; margin-top:16px; cursor:pointer;
          font-weight:500; transition:background .15s ease; }
  .save:hover { background:#85cc9a; }
  .progress { color:var(--fg2); font-size:12px; margin-top:12px; text-align:center; }

  /* 大字打分快捷区 */
  .quick { display:grid; grid-template-columns: repeat(10, 1fr); gap:2px;
           margin-top:6px; }
  .quick button { padding:2px; border:1px solid rgba(255,255,255,.06);
                  background:var(--bg2); color:var(--fg2); cursor:pointer;
                  border-radius:3px; font-family:ui-monospace, monospace; font-size:11px;
                  transition: all .15s ease; }
  .quick button.active { background:var(--aurora); color:#000; border-color:var(--aurora); }
  .quick button:hover { color:var(--fg); }
</style>
</head>
<body>
<div class="grid">
  <aside class="track">
    <h3>缩略图 · <span id="ct">0</span></h3>
    <div id="track-list"></div>
  </aside>

  <main>
    <img id="main-img" alt="" />
    <div class="filename" id="filename">—</div>
    <div class="hint">
      <kbd>←</kbd>/<kbd>→</kbd> 切换 ·
      <kbd>1</kbd>-<kbd>9</kbd>+<kbd>0</kbd> 给当前维度打分 ·
      <kbd>Tab</kbd> 下一维度 ·
      <kbd>S</kbd> 保存
    </div>
  </main>

  <aside class="panel">
    <h3>8 维评分</h3>
    <div id="dims"></div>
    <button class="save" onclick="save()">保存 (S)</button>
    <div class="progress" id="progress">0 / 0 已标</div>
  </aside>
</div>

<script>
let STATE = { photos:[], dims:[], prefill:{}, existing:{}, idx:0, scores:{}, activeDim:0 };

const DIM_LABEL = {
  overall:"综合", composition:"构图", visual_elements:"视觉元素",
  technical:"技术执行", originality:"原创性", theme:"主题",
  emotion:"情感", gestalt:"格式塔",
};

async function init() {
  const r = await fetch("/api/state");
  const s = await r.json();
  STATE.photos = s.photos; STATE.dims = s.dims;
  STATE.prefill = s.prefill; STATE.existing = s.existing;
  renderTrack();
  if (s.photos.length) selectPhoto(0);
  updateProgress();
}

function renderTrack() {
  const list = document.getElementById("track-list");
  list.innerHTML = "";
  document.getElementById("ct").textContent = STATE.photos.length;
  STATE.photos.forEach((p, i) => {
    const done = STATE.existing[p];
    const div = document.createElement("div");
    div.className = "thumb" + (i===STATE.idx?" selected":"") + (done?" done":"");
    div.innerHTML = `<span class="name">${p}</span>` +
                    (done ? `<span class="badge">${done.scores.overall.toFixed(1)}</span>` : "");
    div.onclick = () => selectPhoto(i);
    list.appendChild(div);
  });
}

function selectPhoto(i) {
  STATE.idx = i; STATE.activeDim = 0;
  const name = STATE.photos[i];
  document.getElementById("main-img").src = "/photos/" + name;
  document.getElementById("filename").textContent = name;
  // 初值优先级:已存在标注 > prefill > 5.0
  STATE.scores = {};
  const existing = STATE.existing[name];
  for (const d of STATE.dims) {
    if (existing) STATE.scores[d] = existing.scores[d];
    else if (STATE.prefill[name] && STATE.prefill[name][d] != null) STATE.scores[d] = STATE.prefill[name][d];
    else STATE.scores[d] = 5.0;
  }
  renderDims(); renderTrack();
}

function renderDims() {
  const el = document.getElementById("dims");
  el.innerHTML = "";
  STATE.dims.forEach((d, di) => {
    const v = STATE.scores[d];
    const isActive = di === STATE.activeDim;
    const div = document.createElement("div");
    div.className = "dim" + (isActive ? " active" : "");
    div.style.background = isActive ? "rgba(143,184,209,.06)" : "transparent";
    div.innerHTML = `
      <label>${DIM_LABEL[d] || d}${isActive ? " ◂" : ""}</label>
      <span class="value">${v.toFixed(1)}</span>
      <input type="range" min="0" max="10" step="0.1" value="${v}" oninput="setScore('${d}', this.value)" />
      <div class="quick" style="grid-column: 1/-1;">
        ${Array.from({length:11}, (_,n) => `<button class="${Math.round(v)===n?'active':''}" onclick="quickSet('${d}', ${n})">${n}</button>`).join("")}
      </div>
    `;
    el.appendChild(div);
  });
}

function setScore(dim, v) { STATE.scores[dim] = parseFloat(v); renderDims(); }
function quickSet(dim, n) { STATE.scores[dim] = n; renderDims(); }

async function save() {
  const name = STATE.photos[STATE.idx];
  const r = await fetch("/api/annotate", {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ image: name, scores: STATE.scores }),
  });
  if (r.ok) {
    STATE.existing[name] = { scores:{...STATE.scores} };
    updateProgress();
    if (STATE.idx < STATE.photos.length - 1) selectPhoto(STATE.idx + 1);
    else renderTrack();
  }
}

function updateProgress() {
  document.getElementById("progress").textContent =
    `${Object.keys(STATE.existing).length} / ${STATE.photos.length} 已标`;
}

document.addEventListener("keydown", (e) => {
  if (e.target.tagName === "INPUT") return;
  if (e.key === "ArrowLeft" && STATE.idx > 0) selectPhoto(STATE.idx - 1);
  else if (e.key === "ArrowRight" && STATE.idx < STATE.photos.length - 1) selectPhoto(STATE.idx + 1);
  else if (e.key === "Tab") { e.preventDefault(); STATE.activeDim = (STATE.activeDim + 1) % STATE.dims.length; renderDims(); }
  else if (e.key === "s" || e.key === "S") save();
  else if (e.key >= "0" && e.key <= "9") {
    const dim = STATE.dims[STATE.activeDim];
    STATE.scores[dim] = e.key === "0" ? 10 : parseInt(e.key);
    renderDims();
  }
});

init();
</script>
</body>
</html>
