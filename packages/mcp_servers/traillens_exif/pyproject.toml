[project]
name = "traillens-exif"
version = "0.0.1"
description = "MCP server that reads EXIF metadata from photographs."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "TrailLens" }]
keywords = ["mcp", "exif", "photography", "traillens"]
dependencies = [
    "Pillow>=10.0",
]

[project.optional-dependencies]
mcp = ["mcp>=1.0", "anyio>=4.0"]

[project.scripts]
traillens-exif = "traillens_exif.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["traillens_exif"]
