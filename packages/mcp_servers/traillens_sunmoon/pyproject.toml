[project]
name = "traillens-sunmoon"
version = "0.0.1"
description = "MCP server exposing sunrise/sunset, golden/blue hour, moon phase for photographers."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "TrailLens" }]
keywords = ["mcp", "astronomy", "golden-hour", "photography", "traillens"]
dependencies = []

[project.optional-dependencies]
mcp = ["mcp>=1.0", "anyio>=4.0"]
precise = ["astral>=3.2"]

[project.scripts]
traillens-sunmoon = "traillens_sunmoon.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["traillens_sunmoon"]
