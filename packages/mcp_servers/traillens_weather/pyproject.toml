[project]
name = "traillens-weather"
version = "0.0.1"
description = "MCP server: weather + forecast via Open-Meteo (no API key)."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "TrailLens" }]
keywords = ["mcp", "weather", "open-meteo", "traillens"]
dependencies = []

[project.optional-dependencies]
mcp = ["mcp>=1.0", "anyio>=4.0"]

[project.scripts]
traillens-weather = "traillens_weather.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["traillens_weather"]
